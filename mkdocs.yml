site_name: gaussx
site_description: Structured linear algebra, Gaussian distributions, and exponential family primitives for JAX.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/gaussx
repo_name: jejjohnson/gaussx

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            heading_level: 3
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: false
            filters: ["!^_"]
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true
      include: ["*.ipynb"]

nav:
  - Home: index.md
  - Vision: vision.md
  - Architecture: architecture.md
  - Design:
      - Unified Solvers: design/unified-solvers.md
  - Examples:
      - Basics: notebooks/basics.ipynb
      - Operator Zoo: notebooks/operator_zoo.ipynb
      - Woodbury Solve: notebooks/woodbury_solve.ipynb
      - Kronecker Eigendecomposition: notebooks/kronecker_eigen.ipynb
      - Kernel Regression: notebooks/kernel_regression.ipynb
      - GP on a 2D Grid: notebooks/gp_2d_grid.ipynb
      - Sparse Variational GP: notebooks/sparse_variational_gp.ipynb
      - Structured GP: notebooks/structured_gp.ipynb
      - Solver Comparison: notebooks/solver_comparison.ipynb
      - Differentiating Through Solve: notebooks/differentiating_solve.ipynb
      - Sugar Operations: notebooks/sugar_ops.ipynb
      - Exponential Family: notebooks/exponential_family.ipynb
      - Kalman Filter: notebooks/kalman_filter.ipynb
      - Solver Strategies: notebooks/solver_strategies.ipynb
      - Bayesian Updates: notebooks/bayesian_updates.ipynb
      - Uncertainty Propagation: notebooks/uncertainty_propagation.ipynb
      - "NumPyro: GP Regression": notebooks/numpyro_gp.ipynb
      - "NumPyro: Precision BLR": notebooks/numpyro_precision.ipynb
      - Conditional Distributions: notebooks/conditional_distributions.ipynb
      - Parallel Kalman Filter: notebooks/parallel_kalman.ipynb
      - Expectation Propagation: notebooks/expectation_propagation.ipynb
      - Ensemble Kalman Filter: notebooks/ensemble_kalman.ipynb
      - Natural Gradient VI: notebooks/natural_gradient_vi.ipynb
      - Kernel Approximations: notebooks/kernel_approximations.ipynb
      - LOVE Cross-Validation: notebooks/love_crossval.ipynb
      - Whitened SVGP & BLR: notebooks/whitened_svgp.ipynb
      - GP with Uncertain Inputs: notebooks/uncertain_gp_inputs.ipynb
      - Matrix-Free GP: notebooks/implicit_kernel.ipynb
  - API Reference:
      - Overview: api/index.md
      - Primitives: api/primitives.md
      - Operators & Tags: api/operators.md
      - Solvers & Preconditioners: api/solvers.md
      - Linear-Algebra Utilities: api/linalg.md
      - Distributions & Exponential Family: api/distributions.md
      - Gaussian Processes: api/gp.md
      - Kernels & Approximations: api/kernels.md
      - Quadrature & Moment Matching: api/quadrature.md
      - State-Space Models & Kalman: api/ssm.md
      - Bayesian Inference & Ensembles: api/inference.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
